services:
  - type: web
    name: oro-y-traicion-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CLIENT_ORIGIN
        value: https://oro-y-traicion-client.onrender.com

  - type: web
    name: oro-y-traicion-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        value: https://oro-y-traicion-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
